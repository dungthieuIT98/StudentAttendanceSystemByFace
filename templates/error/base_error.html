<!DOCTYPE html>
<html dir="ltr" lang="vi">
<head>
    {% load static %}
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>{% block title %}Lỗi - Face Attendance{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'assets/images/favicon.png' %}"/>
    <link href="{% static 'vendor/bootstrap/5.3.3/css/bootstrap.min.css' %}" rel="stylesheet"/>
    <link href="{% static 'assets/css/style.css' %}" rel="stylesheet"/>
    <link href="{% static 'vendor/mdi/css/materialdesignicons.min.css' %}" rel="stylesheet"/>
    <style>
        .error-page {
            min-height: 100vh;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 480px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-card p-5">
            {% block error-type %}
            <div class="mb-5">
                <i class="mdi mdi-alert-circle-outline text-danger" style="font-size: 6rem; opacity: 0.8;"></i>
            </div>
            {% endblock %}
            
            <h2 class="fw-bold text-dark mb-3">Có lỗi xảy ra</h2>
            <h4 class="text-muted mb-4">Chúng tôi xin lỗi vì sự bất tiện này.</h4>
            
            <p class="text-muted mb-5">
                Vui lòng thử lại hoặc liên hệ quản trị viên nếu vấn đề vẫn tiếp diễn.
            </p>
            
            <div class="d-flex gap-3 justify-content-center">
                <a href="{% url 'logout' %}" class="btn btn-primary d-flex align-items-center gap-2">
                    <i class="mdi mdi-home"></i>
                    Về trang đăng nhập
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                    Quay lại
                </a>
            </div>
            
            <div class="mt-5 pt-5 border-top text-muted small">
                Face Attendance System • HUTECH
            </div>
        </div>
    </div>

    <script src="{% static 'vendor/bootstrap/5.3.3/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
