<div id="addNewStudentInClassModal" tabindex="-1" class="modal fade" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thêm sinh viên vào lớp học</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addNewStudentInClassForm" method="POST"
                      action="{% url 'admin_list_student_in_class_add' classroom_id=classroom_id %}">
                    {% csrf_token %}
                    <div class="mb-3 form-group row d-flex justify-content-center">
                        <label for="id_students" class="col-sm-3 control-label col-form-label">
                            Chọn sinh viên
                        </label>
                        <div class="col-sm-9">
                            <div class="input-group">
                                <select class="form-select" name="id_students" id="id_students" multiple required size="8">
                                    {% for student in available_students %}
                                        <option value="{{ student.id_student }}">
                                            {{ student.student_name }} - {{ student.id_student }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="form-text text-muted small mt-1">
                                Giữ Ctrl (hoặc Cmd) để chọn nhiều sinh viên.
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-success text-white">Thêm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
