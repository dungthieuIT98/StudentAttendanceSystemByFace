<div id="editNotificationModal" tabindex="-1" class="modal fade" role="dialog">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Chỉnh sửa thông báo</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editNotificationForm" method="post" action="">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_title_edit" class="form-label text-dark">Tiêu đề</label>
                        <input type="text" class="form-control" id="id_title_edit" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_body_edit" class="form-label text-dark">Nội dung</label>
                        <textarea id="id_body_edit" name="body"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="id_type_edit" class="form-label text-dark">Hiển thị cho</label>
                        <select class="form-select" id="id_type_edit" name="type" required>
                            {% for value,label in type_choices %}
                                <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-success text-white">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
